spring.application.name=sql2bot

# Server Configuration
server.port=8082
server.servlet.session.timeout=300s
spring.mvc.async.request-timeout=300000

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/sql2bot?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Use MySQL schema and data
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.mode=never

# HikariCP Connection Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.tecdo.mac.sql2bot.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Jackson Configuration
spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null

# Logging (日志配置在 logback-spring.xml 中)
logging.level.com.tecdo.mac.sql2bot=DEBUG
logging.level.org.springframework.web=INFO

# Claude API Configuration (使用本地中转站)
claude.api.base-url=http://localhost:5580
claude.api.key=qwe23hy
claude.api.model=claude-3-5-sonnet-20241022
claude.api.max-tokens=4096
claude.api.temperature=0.0

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Embedding Configuration (使用 Claude API 生成 embedding)
embedding.api.base-url=http://localhost:5580
embedding.api.key=qwe23hy
embedding.dimension=1024

# Schema 索引定时任务配置
scheduler.schema-index.enabled=true
scheduler.schema-index.cron=0 0 * * * ?